<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LFA Engenharia | Links</title>
    <meta name="description" content="LFA Engenharia. Conectando processos, tecnologia e infraestrutura.">
    <link rel="icon" type="image/svg+xml" href="https://lfaengenharia.com/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="https://lfaengenharia.com/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="https://lfaengenharia.com/favicon-192x192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="https://lfaengenharia.com/apple-touch-icon.png" />
    
    <style>
        :root {
            --bg-color-center: #0c1017;
            --bg-color-edge: #05070a;
            --primary-accent: #E1B14F;
            --text-main: #FFFFFF;
            --text-support: #9CA3AF;
            --btn-bg: rgba(26, 26, 26, 0.7);
            --btn-border: #343434;
            --btn-hover-border: rgba(225, 177, 79, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color-edge);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            position: relative;
        }

        .bg-carousel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-color: var(--bg-color-edge);
        }

        .bg-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            animation: carouselFade 18s infinite;
            will-change: opacity;
        }

        .bg-slide:nth-child(1) {
            animation-delay: 0s;
        }

        .bg-slide:nth-child(2) {
            animation-delay: 6s;
        }

        .bg-slide:nth-child(3) {
            animation-delay: 12s;
        }

        @keyframes carouselFade {
            0% { opacity: 0; }
            8.33% { opacity: 1; } /* 1.5s in */
            33.33% { opacity: 1; } /* stays visible */
            41.66% { opacity: 0; } /* 1.5s out */
            100% { opacity: 0; }
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            background: rgba(5, 7, 10, 0.7); /* Escurecendo o fundo para contraste */
            z-index: -1;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 480px;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            text-align: center;
        }

        /* Topo */
        .brand-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .separator {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(225,177,79,0.4) 20%, rgba(225,177,79,0.4) 80%, transparent);
        }

        /* Botões */
        .links-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
        }

        .link-button {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 1rem 1.5rem;
            min-height: 56px;
            background-color: var(--primary-accent);
            border: 1px solid var(--primary-accent);
            border-radius: 9999px;
            text-decoration: none;
            color: #1A1A1A;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            gap: 1rem;
        }

        .link-button:hover, .link-button:focus {
            background-color: #d4a045;
            border-color: #d4a045;
            box-shadow: 0 0 15px rgba(225, 177, 79, 0.4);
            outline: none;
            transform: translateY(-2px);
        }

        .link-button .icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            flex-shrink: 0;
            color: #1A1A1A;
        }

        .link-button .text {
            flex-grow: 1;
            text-align: left;
        }

        .link-button .arrow {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            color: #1A1A1A;
            opacity: 0.7;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .link-button:hover .arrow {
            opacity: 1;
            transform: translateX(4px);
        }

        /* Rodapé */
        .footer {
            margin-top: 1rem;
            font-size: 0.8125rem;
            color: var(--text-support);
            text-align: center;
        }
    </style>
</head>
<body>

        <img class="bg-slide" src="https://lfaengenharia.com/imgs/engenharia-eletrica-arquitetura-bim-alphaville.webp" alt="Engenheiro segurando tablet com projeto de modelagem 3D BIM de instalações elétricas integradas dentro de uma obra residencial de alto padrão." loading="lazy">

                </div>

        </nav>

        <!-- Rodapé -->
        <footer class="footer">
            <p>&copy; 2026 LFA Engenharia.<br>Conectando processos, tecnologia e infraestrutura.</p>
        </footer>
    </main>
</body>
</html>
