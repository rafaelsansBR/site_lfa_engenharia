  html,body{background:#05070a;}
  body{font-family:'Outfit',sans-serif;-webkit-font-smoothing:antialiased;text-rendering:geometricPrecision;}
  /* text-rendering:geometricPrecision desativa o grid-fitting do hinting,
     que escurecia hastes verticais (o "l"/"I" pareciam um traço mais grosso
     que as demais letras). Assim todas as letras ficam no mesmo peso. */
  ::selection{background:#E1B14F;color:#fff;}
  .bg-grid{background-image:linear-gradient(to right,rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(to bottom,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:40px 40px;}
  /* fundo hero do site — camadas fixas atrás do conteúdo do painel */
  .app-bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none;}
  .app-bg-img{background-size:cover;background-repeat:no-repeat;background-position:right center;}
  .app-bg-grid{background-image:linear-gradient(to right,rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(to bottom,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:40px 40px;}
  @media (max-width:680px){ .app-bg-img{background-position:72% center;} }
  /* native select dropdown options — keep them dark so they're legible */
  select option{background:#1A1A1A;color:#fff;}
  select optgroup{background:#1A1A1A;color:#A0AAB5;}
  /* table density (panel tweak) */
  .dense-row>td{padding-top:var(--row-py,16px);padding-bottom:var(--row-py,16px);}
  /* paginação do documento: o ritmo vertical vem do marginTop semântico
     POR unidade (escala SP), então neutralizamos margens-topo herdadas
     dos filhos internos de cada unidade (sem afetar o gap entre unidades). */
  .flow-unit>*{margin-top:0!important;}
  @media print {
    .no-print{display:none!important;}
    .app-bg-layer{display:none!important;}
    html,body{background:#fff!important;}
    /* o documento (.doc-overlay) é filho direto de .app-shell — então NÃO
       escondemos a shell inteira (isso apagava o documento e gerava PDF em
       branco); escondemos apenas os irmãos do overlay. */
    body.doc-open .app-shell > *:not(.doc-overlay){display:none!important;}
    .doc-overlay{position:static!important;background:#fff!important;backdrop-filter:none!important;overflow:visible!important;}
    .doc-print-area{padding:0!important;display:block!important;}
    /* desfaz a escala de tela — no papel cada folha é A4 cheia */
    .doc-sizer{width:auto!important;height:auto!important;position:static!important;}
    .doc-pages{position:static!important;transform:none!important;width:auto!important;gap:0!important;}
    .doc-page{box-shadow:none!important;border:none!important;border-radius:0!important;break-inside:avoid;break-after:page;page-break-after:always;}
    .doc-page:last-child{break-after:auto;page-break-after:auto;}
    @page{size:A4;margin:0;}
  }
</style>

const THEME_MAP  = { 'Dark': 'dark', 'Light': 'light', 'Papel': 'paper' };
const LAYOUT_MAP = { 'Clássico': 'classic', 'Centralizado': 'centered', 'Lateral': 'sidebar' };
const GRID_MAP   = { 'Apagado': 'off', 'Sutil': 'subtle', 'Visível': 'visible' };
const ACCENT_MAP = { '#E1B14F': 'gold', '#B07D3F': 'bronze', '#3E7480': 'petrol' };

// Panel-level (app shell) tweak maps.
const PANEL_AC_BYHEX = {
  '#E1B14F': { rgb: '225,177,79', ink: '#1A1A1A' },
  '#B0763A': { rgb: '176,118,58', ink: '#FFFFFF' },
  '#2F6E7B': { rgb: '47,110,123', ink: '#FFFFFF' },
};
const PANEL_BGS  = { 'Carvão': '#05070a', 'Azulado': '#070B14', 'Grafite': '#0C0D11' };
const PANEL_BG_RGB = { '#05070a': '5,7,10', '#070B14': '7,11,20', '#0C0D11': '12,13,17' };
const PANEL_DENS = { 'Confortável': '16px', 'Compacto': '9px' };

// Constrói o scrim (sobreposição escura) por cima da imagem hero. Mais "destaque"
// = scrim mais leve, imagem mais presente. O lado esquerdo (título + conteúdo)
// fica sempre coberto para legibilidade; a figura à direita respira.
function buildScrim(bgHex, glow) {
  const rgb = PANEL_BG_RGB[bgHex] || '5,7,10';
  const P = {
    'Discreto':    { h: [0.99, 0.96, 0.88, 0.80, 0.90], top: 0.62, bot: 0.85 },
    'Equilibrado': { h: [0.98, 0.92, 0.74, 0.50, 0.74], top: 0.50, bot: 0.72 },
    'Destaque':    { h: [0.96, 0.86, 0.58, 0.30, 0.56], top: 0.40, bot: 0.60 },
  }[glow] || { h: [0.98, 0.92, 0.74, 0.50, 0.74], top: 0.50, bot: 0.72 };
  const c = (a) => `rgba(${rgb},${a})`;
  const horizontal = `linear-gradient(90deg, ${c(P.h[0])} 0%, ${c(P.h[1])} 30%, ${c(P.h[2])} 52%, ${c(P.h[3])} 74%, ${c(P.h[4])} 100%)`;
  const vertical = `linear-gradient(180deg, ${c(P.top)} 0%, rgba(${rgb},0) 26%, rgba(${rgb},0) 60%, ${c(P.bot)} 100%)`;
  return `${vertical}, ${horizontal}`;
}

function ConfirmDelete({ target, onConfirm, onCancel }) {
  if (!target) return null;
  return (
    <div onClick={(e)=>{if(e.target===e.currentTarget)onCancel();}}
      className="fixed inset-0 z-[400] flex items-center justify-center p-4" style={{ background:'rgba(3,4,6,0.8)', backdropFilter:'blur(6px)' }}>
      <div className="w-full max-w-sm rounded-2xl p-7" style={{ background:T.surface, border:'1px solid rgba(248,113,113,0.3)', boxShadow:'0 30px 60px -15px rgba(0,0,0,0.7)' }}>
        <div className="w-11 h-11 rounded-full flex items-center justify-center mb-4" style={{ background:'rgba(248,113,113,0.12)', border:'1px solid rgba(248,113,113,0.3)' }}>
          <Icon name="trash-2" className="w-5 h-5" style={{ color:'#f87171' }} />
        </div>
        <h3 className="font-[Outfit] font-bold text-white text-lg mb-1.5">Excluir proposta?</h3>
        <p className="text-sm mb-6" style={{ color:T.fg2 }}>
          O registro <span className="text-white font-medium"><ProposalCode code={target.id} /></span> — {target.cliente} — será removido permanentemente do sistema. Esta ação é exclusiva do Diretor.
        </p>
        <div className="flex gap-3 justify-end">
          <button onClick={onCancel} className="px-4 py-2.5 rounded-full text-sm font-medium transition-colors hover:text-white" style={{ color:T.fg2, border:'1px solid rgba(255,255,255,0.15)' }}>Cancelar</button>
          <button onClick={onConfirm} className="px-5 py-2.5 rounded-full text-sm font-semibold text-white transition-all hover:brightness-110" style={{ background:'#dc2626' }}>Excluir</button>
        </div>
      </div>
    </div>
  );
}

function ConfirmDeleteClient({ target, onConfirm, onCancel }) {
  if (!target) return null;
  return (
    <div onClick={(e)=>{if(e.target===e.currentTarget)onCancel();}}
      className="fixed inset-0 z-[400] flex items-center justify-center p-4" style={{ background:'rgba(3,4,6,0.8)', backdropFilter:'blur(6px)' }}>
      <div className="w-full max-w-sm rounded-2xl p-7" style={{ background:T.surface, border:'1px solid rgba(248,113,113,0.3)', boxShadow:'0 30px 60px -15px rgba(0,0,0,0.7)' }}>
        <div className="w-11 h-11 rounded-full flex items-center justify-center mb-4" style={{ background:'rgba(248,113,113,0.12)', border:'1px solid rgba(248,113,113,0.3)' }}>
          <Icon name="trash-2" className="w-5 h-5" style={{ color:'#f87171' }} />
        </div>
        <h3 className="font-[Outfit] font-bold text-white text-lg mb-1.5">Excluir cliente?</h3>
        <p className="text-sm mb-6" style={{ color:T.fg2 }}>
          O cliente <span className="text-white font-medium">{target.nome}</span> será removido permanentemente do sistema. As propostas associadas a ele continuarão registradas, mas sem vínculo de cliente. Esta ação é exclusiva do Diretor.
        </p>
        <div className="flex gap-3 justify-end">
          <button onClick={onCancel} className="px-4 py-2.5 rounded-full text-sm font-medium transition-colors hover:text-white" style={{ color:T.fg2, border:'1px solid rgba(255,255,255,0.15)' }}>Cancelar</button>
          <button onClick={onConfirm} className="px-5 py-2.5 rounded-full text-sm font-semibold text-white transition-all hover:brightness-110" style={{ background:'#dc2626' }}>Excluir</button>
        </div>
      </div>
    </div>
  );
}

// Persistência via Supabase — dados são buscados do banco no mount.
// O localStorage não é mais usado como fonte de dados.

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [user, setUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const role = user ? user.role : null;
  const [view, setView] = useState('engenheiro');
  const [proposals, setProposals] = useState([]);
  const [loadingData, setLoadingData] = useState(false);
  const [docId, setDocId] = useState(null);
  const [toDelete, setToDelete] = useState(null);
  const [toDeleteClient, setToDeleteClient] = useState(null);
  const [composing, setComposing] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [settingsOpen, setSettingsOpen] = useState(false);

  /* 🔒 Auth state listener — reage a login/logout/expiração de sessão */
  useEffect(() => {
    let mounted = true;
    const initAuth = async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session && mounted) {
        const profile = await sbGetProfile();
        if (profile && mounted) {
          setUser({
            email: profile.email,
            role: profile.role === 'director' ? 'diretor' : 'engenheiro',
            nome: profile.full_name || profile.email.split('@')[0],
            _profileId: profile.id,
            _tenantId: profile.tenant_id,
          });
        }
      }
      if (mounted) setAuthLoading(false);
    };
    initAuth();
    const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_OUT' || !session) {
        setUser(null);
        setProposals([]);
      }
    });
    return () => { mounted = false; subscription.unsubscribe(); };
  }, []);

  /* Carrega propostas do Supabase quando user loga */
  const loadData = async () => {
    setLoadingData(true);
    const data = await sbFetchProposals();
    setProposals(data);
    setLoadingData(false);
  };
  useEffect(() => { if (user) { loadData(); setView(user.role === 'diretor' ? 'diretor' : 'engenheiro'); } }, [user]);

  const clients = React.useMemo(() => deriveClients(proposals), [proposals]);
  const editing = proposals.find((p) => p.id === editingId) || null;

  /* — Operações de dados (async, via Supabase) — */
  const afterSave = () => loadData(); // Recarrega após qualquer mutação

  const setStatus = async (id, status) => {
    const prop = proposals.find((p) => p.id === id);
    if (!prop) return;
    try {
      await sbUpdateStatus(prop._dbId, status);
      await loadData();
    } catch (err) { console.error('setStatus error:', err); }
  };

  const remove = async () => {
    if (!toDelete) return;
    try {
      await sbDeleteProposal(toDelete._dbId);
      setToDelete(null);
      await loadData();
    } catch (err) { console.error('remove error:', err); }
  };

  const removeClient = async () => {
    if (!toDeleteClient) return;
    try {
      await sbDeleteClient(toDeleteClient.id);
      setToDeleteClient(null);
      await loadData();
    } catch (err) { console.error('removeClient error:', err); }
  };

  const editDraft = (id) => { setEditingId(id); setComposing(true); };
  const closeComposer = () => { setComposing(false); setEditingId(null); };

  const logout = async () => {
    setDocId(null); setComposing(false); setEditingId(null); setSettingsOpen(false);
    await supabase.auth.signOut();
    setUser(null);
  };
  const docProposal = proposals.find((p) => p.id === docId) || null;

  useEffect(() => {
    document.body.classList.toggle('doc-open', !!docProposal);
  }, [docProposal]);

  // Quando os Tweaks são ligados, abre uma proposta automaticamente para que
  // os ajustes do documento (tema/layout/acento) fiquem visíveis na hora.
  useEffect(() => {
    const onMsg = (e) => {
      if (e && e.data && e.data.type === '__activate_edit_mode') {
        setDocId((cur) => cur || (proposals[0] && proposals[0].id) || null);
      }
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [proposals]);

  const pac = PANEL_AC_BYHEX[t.panelAccent] || PANEL_AC_BYHEX['#E1B14F'];
  const panelBg = PANEL_BGS[t.panelBg] || '#05070a';
  const rowPy = PANEL_DENS[t.panelDensity] || '16px';
  const showImg = t.panelImage !== 'Sem imagem';
  const scrim = buildScrim(panelBg, t.panelGlow);

  const Tab = ({ id, icon, label }) => (
    <button onClick={() => setView(id)}
      className="flex items-center gap-2 px-4 py-2 rounded-full text-sm font-medium transition-all duration-200 whitespace-nowrap"
      style={ effectiveView===id ? { background:'var(--ac)', color:'var(--ac-ink)' } : { color:T.fg2 } }>
      <Icon name={icon} className="w-4 h-4" /> <span className="hidden sm:inline">{label}</span>
    </button>
  );

  const TABS = role === 'diretor'
    ? [ {id:'diretor',icon:'line-chart',label:'Diretor'}, {id:'engenheiro',icon:'hard-hat',label:'Engenheiro'}, {id:'clientes',icon:'users',label:'Clientes'} ]
    : [ {id:'engenheiro',icon:'hard-hat',label:'Engenheiro'}, {id:'clientes',icon:'users',label:'Clientes'} ];
  const allowed = TABS.map((x) => x.id);
  const effectiveView = allowed.includes(view) ? view : allowed[0];
  const HEAD = {
    engenheiro: { t:'Painel do Engenheiro', s:'Emita propostas e gerencie o andamento comercial. Registros emitidos ficam travados.' },
    clientes:   { t:'Clientes', s:'Sua base de relacionamento — LTV, histórico e origem de cada cliente.' },
    diretor:    { t:'Painel do Diretor', s:'Visão global de gestão e inteligência. Comissões realizada e projetada, e controle master.' },
  };

  if (authLoading) return (
    <div className="min-h-screen flex items-center justify-center" style={{ background: '#05070a' }}>
      <div className="flex flex-col items-center gap-4">
        <img src="assets/lfa-monogram-gold.png" alt="LFA" style={{ height: 48, opacity: 0.7 }} />
        <div className="w-6 h-6 border-2 border-t-transparent rounded-full animate-spin" style={{ borderColor: 'rgba(225,177,79,0.5)', borderTopColor: 'transparent' }}></div>
      </div>
    </div>
  );
  if (!user) return <Login onLogin={setUser} />;

  return (
    <div className="app-shell min-h-screen" style={{ background: panelBg, '--ac': t.panelAccent, '--ac-r': pac.rgb, '--ac-ink': pac.ink, '--row-py': rowPy }}>
      {/* fundo hero do site — camadas fixas (imagem → scrim → grid) atrás do conteúdo */}
      {showImg && <div className="app-bg-layer app-bg-img" style={{ backgroundImage: 'url(assets/site-hero.webp)' }}></div>}
      {showImg && <div className="app-bg-layer" style={{ background: scrim }}></div>}
      <div className="app-bg-layer app-bg-grid"></div>
      {/* top bar */}
      <header className="no-print sticky top-0 z-20 flex items-center justify-between gap-4 px-5 sm:px-8 py-4"
        style={{ background:'rgba(5,7,10,0.8)', backdropFilter:'blur(12px)', borderBottom:'1px solid rgba(255,255,255,0.06)' }}>
        <div className="flex items-center gap-3">
          <img src="assets/lfa-monogram-gold.png" alt="LFA" style={{ height:34 }} />
          <div className="hidden sm:flex flex-col" style={{ lineHeight:0.9 }}>
            <span className="font-[Outfit] font-bold text-white text-sm tracking-wide">Propostas Profissionais</span>
            <span className="text-[10px] tracking-wider" style={{ color:T.fg3 }}>LFA ENGENHARIA · SISTEMA INTERNO</span>
          </div>
        </div>
        <nav className="flex items-center gap-1.5 p-1 rounded-full" style={{ background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.06)' }}>
          {TABS.map((tb) => <Tab key={tb.id} id={tb.id} icon={tb.icon} label={tb.label} />)}
        </nav>
        <div className="flex items-center gap-3">
          <div className="hidden md:flex flex-col items-end" style={{ lineHeight:1.1 }}>
            <span className="text-xs font-semibold text-white">{user.nome}</span>
            <span className="text-[10px] tracking-wider" style={{ color:T.fg3 }}>{role==='diretor' ? 'DIRETORIA' : 'ENGENHARIA'}</span>
          </div>
          <button onClick={() => setSettingsOpen(true)} title="Configurações" className="flex items-center gap-1.5 text-xs font-medium rounded-full px-2.5 py-2 transition-colors hover:text-white" style={{ color: T.fg2, border: '1px solid rgba(255,255,255,0.14)' }}>
            <Icon name="settings" className="w-3.5 h-3.5" />
          </button>
          <button onClick={logout} title="Sair" className="flex items-center gap-1.5 text-xs font-medium rounded-full px-3 py-2 transition-colors hover:text-white" style={{ color:T.fg2, border:'1px solid rgba(255,255,255,0.14)' }}>
            <Icon name="log-out" className="w-3.5 h-3.5" /> <span className="hidden sm:inline">Sair</span>
          </button>
        </div>
      </header>

      <main className="relative px-5 sm:px-8 py-8 max-w-[1240px] mx-auto">
        <div className="mb-6">
          <h1 className="font-[Outfit] font-bold text-white text-2xl">{HEAD[effectiveView].t}</h1>
          <p className="text-sm mt-1" style={{ color:T.fg2 }}>{HEAD[effectiveView].s}</p>
        </div>

        {effectiveView==='engenheiro' && <EngineerView proposals={proposals} onStatusChange={setStatus} onView={setDocId} onNew={() => { setEditingId(null); setComposing(true); }} onEdit={editDraft} />}
        {effectiveView==='clientes' && <ClientsView proposals={proposals} onView={setDocId} role={role} onDeleteClient={setToDeleteClient} />}
        {effectiveView==='diretor' && role==='diretor' && <DirectorView proposals={proposals} onDelete={setToDelete} onView={setDocId} onEdit={editDraft} />}
      </main>

      <Composer open={composing} onClose={closeComposer} onEmit={afterSave} onSaveDraft={afterSave} editing={editing} user={user} proposals={proposals} />

      <ProposalDoc proposal={docProposal} onClose={() => setDocId(null)}
        theme="light" layout={LAYOUT_MAP[t.docLayout] || 'classic'}
        grid={GRID_MAP[t.docGrid] || 'subtle'} accent={ACCENT_MAP[t.docAccent] || 'gold'} />
      <ConfirmDelete target={toDelete} onConfirm={remove} onCancel={() => setToDelete(null)} />
      <ConfirmDeleteClient target={toDeleteClient} onConfirm={removeClient} onCancel={() => setToDeleteClient(null)} />
      <SettingsModal open={settingsOpen} onClose={() => setSettingsOpen(false)} />

      <TweaksPanel>
        <TweakSection label="Painel" />
        <TweakColor label="Acento da interface" value={t.panelAccent} options={['#E1B14F', '#B0763A', '#2F6E7B']} onChange={(v) => setTweak('panelAccent', v)} />
        <TweakRadio label="Imagem de fundo" value={t.panelImage} options={['Hero do site', 'Sem imagem']} onChange={(v) => setTweak('panelImage', v)} />
        <TweakRadio label="Presença da imagem" value={t.panelGlow} options={['Discreto', 'Equilibrado', 'Destaque']} onChange={(v) => setTweak('panelGlow', v)} />
        <TweakRadio label="Tom de fundo" value={t.panelBg} options={['Carvão', 'Azulado', 'Grafite']} onChange={(v) => setTweak('panelBg', v)} />
        <TweakRadio label="Densidade" value={t.panelDensity} options={['Confortável', 'Compacto']} onChange={(v) => setTweak('panelDensity', v)} />
        <TweakSection label="Documento da proposta" />
        <TweakRadio label="Gridline" value={t.docGrid} options={['Apagado', 'Sutil', 'Visível']} onChange={(v) => setTweak('docGrid', v)} />
        <TweakColor label="Acento" value={t.docAccent} options={['#E1B14F', '#B07D3F', '#3E7480']} onChange={(v) => setTweak('docAccent', v)} />
        <p style={{ fontSize: 11, lineHeight: 1.5, opacity: 0.6, margin: '4px 2px 0' }}>O documento da proposta é o que o cliente vê — sempre em <b>tema claro</b> (impressão), sem status, origem ou comissões. Abre sozinho ao ativar os Tweaks.</p>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
setTimeout(() => window.lucide && window.lucide.createIcons(), 300);
</script>
</body>
</html>
